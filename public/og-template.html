<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>OG template - 1200x630</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0a0a0a; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, system-ui, "Helvetica Neue", Arial, sans-serif;
    }

    .banner {
      position: relative;
      width: 1200px;
      height: 630px;
      background: #022f51;
      overflow: hidden;
      isolation: isolate;
    }

    /* Concentric rings, same math as the hero */
    .rings {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 50% 40%, transparent 149px, rgba(52,76,163,0.18) 150px, transparent 151px),
        radial-gradient(circle at 50% 40%, transparent 249px, rgba(52,76,163,0.15) 250px, transparent 251px),
        radial-gradient(circle at 50% 40%, transparent 349px, rgba(52,76,163,0.12) 350px, transparent 351px),
        radial-gradient(circle at 50% 40%, transparent 449px, rgba(52,76,163,0.10) 450px, transparent 451px),
        radial-gradient(circle at 50% 40%, transparent 549px, rgba(52,76,163,0.08) 550px, transparent 551px),
        radial-gradient(circle at 50% 40%, transparent 649px, rgba(52,76,163,0.06) 650px, transparent 651px);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 60%, transparent 95%);
              mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 60%, transparent 95%);
    }

    /* Soft center glow */
    .glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse 55% 50% at 50% 45%, rgba(52,76,163,0.55) 0%, rgba(52,76,163,0.25) 35%, rgba(52,76,163,0.08) 65%, transparent 85%);
    }

    /* Warm corner accent */
    .warm {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse 35% 50% at 92% 100%, rgba(255,140,66,0.14) 0%, transparent 70%);
    }

    /* Vignette edges so text always reads */
    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(to right, rgba(2,47,81,0.4) 0%, transparent 12%, transparent 88%, rgba(2,47,81,0.4) 100%),
        linear-gradient(to bottom, rgba(2,47,81,0.3) 0%, transparent 15%, transparent 85%, rgba(2,47,81,0.5) 100%);
    }

    /* Grain */
    .grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.05;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2'/><feColorMatrix type='saturate' values='0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
    }

    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 120px;
    }

    .logo {
      width: 420px;
      height: auto;
      display: block;
      margin: 0 auto 28px;
      filter: drop-shadow(0 8px 40px rgba(0,0,0,0.35));
    }

    .tagline {
      color: rgba(255,255,255,0.92);
      font-size: 32px;
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.25;
      margin: 0;
      max-width: 780px;
    }

    .kicker {
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin: 0 0 22px;
    }

    /* Bottom URL badge */
    .url {
      position: absolute;
      bottom: 36px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255,255,255,0.45);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* Export helper */
    .hint {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      color: #888;
      font-size: 12px;
      background: #111;
      padding: 10px 14px;
      border-radius: 8px;
      line-height: 1.5;
    }
    .hint code { color: #eee; background: #222; padding: 1px 5px; border-radius: 3px; }
    @media print { .hint { display: none; } }
  </style>
</head>
<body>
  <div class="hint">
    <strong>Export as og-image.jpg</strong> — right-click the banner below → <em>"Take screenshot"</em> (Firefox) OR open DevTools → Cmd+Shift+P → <code>Capture node screenshot</code> on the <code>.banner</code> element. Save as <code>og-image.jpg</code> and replace <code>public/og-image.jpg</code>.
  </div>

  <div class="banner">
    <div class="rings"></div>
    <div class="glow"></div>
    <div class="warm"></div>
    <div class="vignette"></div>
    <div class="grain"></div>

    <div class="content">
      <p class="kicker">Hooklyne</p>
      <img src="/logo-white.svg" alt="Hooklyne" class="logo" />
      <p class="tagline">B2B prospect research for SME sales teams.</p>
    </div>

    <div class="url">hooklyne.com</div>
  </div>
</body>
</html>
